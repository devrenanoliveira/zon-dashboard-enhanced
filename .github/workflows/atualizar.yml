name: Atualizar Dashboard Automaticamente

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 12h UTC = 9h Brasília (horário de verão)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install pandas PyGithub requests --break-system-packages

      - name: Executar script de atualização
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: python atualizar_dashboard.py
